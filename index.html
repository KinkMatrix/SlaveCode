<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Animated Roleplay Certificate</title>

<!-- QR Code library -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>

<!-- jsPDF library -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

<style>
body {
    margin:0;
    font-family: 'Segoe UI', sans-serif;
    background:#0a0a0a;
    color:white;
    overflow-x:hidden;
}

/* Floating background animation */
body::before {
    content:"";
    position:fixed;
    width:200%;
    height:200%;
    background: radial-gradient(circle, rgba(255,0,80,0.1) 1px, transparent 1px);
    background-size:40px 40px;
    animation: moveBg 20s linear infinite;
    z-index:-1;
}

@keyframes moveBg{
    from{transform:translate(0,0);}
    to{transform:translate(-200px,-200px);}
}

/* Container */
.container{
    max-width:800px;
    margin:60px auto;
    padding:40px;
    background:#141414;
    border-radius:20px;
    box-shadow:0 0 40px rgba(255,0,80,0.4);
    position:relative;
    animation:fadeIn 1s ease;
}

/* Glowing animated border */
.container::before{
    content:"";
    position:absolute;
    inset:-3px;
    border-radius:22px;
    padding:3px;
    background:linear-gradient(45deg, crimson, purple, crimson);
    background-size:400%;
    animation:borderGlow 6s linear infinite;
    z-index:-1;
}

@keyframes borderGlow{
    0%{background-position:0%;}
    100%{background-position:400%;}
}

@keyframes fadeIn{
    from{opacity:0; transform:translateY(30px);}
    to{opacity:1; transform:translateY(0);}
}

/* Heading animation */
h1{
    text-align:center;
    color:crimson;
    animation:pulse 2s infinite alternate;
}

@keyframes pulse{
    from{ text-shadow:0 0 10px crimson; }
    to{ text-shadow:0 0 25px red; }
}

/* Inputs & select */
input, select{
    width:90%;
    padding:12px;
    margin:8px;
    border-radius:8px;
    border:none;
    background:#222;
    color:white;
    transition:0.3s;
}

input:focus, select:focus{
    outline:none;
    box-shadow:0 0 10px crimson;
}

/* Buttons */
button{
    display:block;
    margin:20px auto;
    padding:14px 30px;
    background:crimson;
    color:white;
    border:none;
    border-radius:8px;
    font-weight:bold;
    cursor:pointer;
    transition:0.3s;
}

button:hover{
    box-shadow:0 0 20px red;
    transform:scale(1.05);
}

/* Result ID */
#resultID{
    text-align:center;
    font-size:22px;
    color:#00ffcc;
    margin-top:15px;
    opacity:0;
    transition:0.5s;
}

.showID{
    opacity:1 !important;
    transform:scale(1.05);
}

/* QR Code */
#qrcode{
    text-align:center;
    margin-top:20px;
    opacity:0;
    transition:1s;
}

.showQR{
    opacity:1 !important;
}

/* Shake animation for missing fields */
.shake{
    animation:shake 0.4s;
    border:2px solid red !important;
}

@keyframes shake{
    0%{transform:translateX(0);}
    25%{transform:translateX(-5px);}
    50%{transform:translateX(5px);}
    75%{transform:translateX(-5px);}
    100%{transform:translateX(0);}
}
</style>
</head>

<body>

<div class="container">
<h1>Consensual Roleplay Certificate</h1>

<!-- User info -->
<input type="text" id="username" placeholder="Fet Username (@optional)">
<input type="text" id="fullname" placeholder="Full Name">
<input type="number" id="age" placeholder="Age (18+)">

<!-- Preferences -->
<select id="q1"><option value="">Bondage Preference</option><option>Light</option><option>Moderate</option><option>Heavy</option></select>
<select id="q2"><option value="">Discipline Style</option><option>Verbal</option><option>Impact Play</option><option>Protocol-based</option></select>
<select id="q3"><option value="">Collaring Interest</option><option>Yes</option><option>No</option></select>
<select id="q4"><option value="">Service Orientation</option><option>Domestic</option><option>Personal</option><option>Ceremonial</option></select>
<select id="q5"><option value="">Public Scene Comfort</option><option>Yes</option><option>No</option></select>
<select id="q6"><option value="">Pain Tolerance</option><option>Low</option><option>Medium</option><option>High</option></select>
<select id="q7"><option value="">Humiliation Play</option><option>Yes</option><option>No</option></select>
<select id="q8"><option value="">Dynamic Type</option><option>24/7</option><option>Scene Only</option></select>
<select id="q9"><option value="">Safe Word Established</option><option>Yes</option><option>No</option></select>
<select id="q10"><option value="">Experience Level</option><option>Beginner</option><option>Intermediate</option><option>Advanced</option></select>

<button onclick="generateCertificate()">Generate Certificate</button>

<div id="resultID"></div>
<div id="qrcode"></div>

<button onclick="downloadPDF()">Download Certificate PDF</button>
</div>

<script>
let certData = {};

function validate(field){
    if(!field.value){
        field.classList.add("shake");
        setTimeout(()=>field.classList.remove("shake"),400);
        return false;
    }
    return true;
}

function generateCertificate(){
    const fields=document.querySelectorAll("input,select");
    let valid=true;
    fields.forEach(f=>{ if(!validate(f)) valid=false; });
    if(!valid) return;

    const ageValue=document.getElementById("age").value;
    if(ageValue<18){alert("18+ only.");return;}

    const usernameVal=document.getElementById("username").value.replace("@","").toUpperCase();
    const nameVal=document.getElementById("fullname").value;

    // ID generation
    const prefix=usernameVal.substring(0,3);
    const random=Math.random().toString(36).substring(2,15).toUpperCase();
    const raw=(prefix+random).substring(0,15);
    const formattedID=raw.slice(0,4)+"-"+raw.slice(4,8)+"-"+raw.slice(8,12)+"-"+raw.slice(12,15);

    // Display ID
    const resultElem=document.getElementById("resultID");
    resultElem.innerText=formattedID;
    resultElem.classList.add("showID");

    // Prepare QR text with full info
    const qrText=`CONSENSUAL ROLEPLAY PROFILE
Name: ${nameVal}
Username: ${usernameVal}
Age: ${ageValue}
Roleplay ID: ${formattedID}
Bondage Preference: ${q1.value}
Discipline Style: ${q2.value}
Collaring Interest: ${q3.value}
Service Orientation: ${q4.value}
Public Scene Comfort: ${q5.value}
Pain Tolerance: ${q6.value}
Humiliation Play: ${q7.value}
Dynamic Type: ${q8.value}
Safe Word Established: ${q9.value}
Experience Level: ${q10.value}`;

    certData={name:nameVal,username:usernameVal,formatted:formattedID};

    // Generate QR
    const qrDiv=document.getElementById("qrcode");
    qrDiv.innerHTML="";
    new QRCode(qrDiv,{text:qrText,width:200,height:200});
    qrDiv.classList.add("showQR");
}

async function downloadPDF(){
    if(!certData.formatted){alert("Generate certificate first."); return;}
    const { jsPDF } = window.jspdf;
    const doc=new jsPDF();

    doc.setFontSize(22);
    doc.text("CONSENSUAL ROLEPLAY CERTIFICATE",20,30);
    doc.setFontSize(14);
    doc.text("Name: "+certData.name,20,50);
    doc.text("Username: "+certData.username,20,60);
    doc.text("Roleplay ID: "+certData.formatted,20,70);
    doc.text("Verified Adult (18+)",20,85);

    // QR embedded
    const qrCanvas=document.querySelector("#qrcode canvas");
    const qrImage=qrCanvas.toDataURL("image/png");
    doc.addImage(qrImage,"PNG",140,40,50,50);

    doc.save("Roleplay_Certificate.pdf");
}
</script>

</body>
</html>
